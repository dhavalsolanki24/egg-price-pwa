name: Update Newspaper

on:

  schedule:
    - cron: '45 0 * * *'      # 6:15 AM IST

  workflow_dispatch:

jobs:

  update:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - run: pip install -r requirements.txt

    - run: python fetch_newspaper.py

    - name: Commit newspaper.json

      run: |

        git config --global user.name "github-actions"

        git config --global user.email "actions@github.com"

        git add newspaper.json

        git diff --cached --quiet || git commit -m "Update newspaper"

        git push
